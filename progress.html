    <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
        
        <div id="toast" class="absolute top-4 right-4 z-50 bg-green-50 border border-green-200 text-green-800 p-4 rounded-lg shadow-lg flex items-center transition-all duration-300 opacity-0 transform translate-y-[-1rem] pointer-events-none">

            <span class="text-sm font-medium">Measurement Recorded Successfully</span>
        </div>

        <header class="h-16 flex items-center justify-between px-6 bg-white border-b border-gray-200 shrink-0">
            <h1 class="text-xl font-semibold text-gray-800">History Log</h1>
            <div class="flex items-center gap-4">
                <button onclick="clearHistory()" class="text-sm font-medium text-red-600 hover:text-red-800 transition">Purge Data</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 bg-gray-50">

                    <div class="px-6 py-5 border-b border-gray-200">
                        <h3 class="text-lg font-semibold leading-6 text-gray-900">Recent Health Check-ins</h3>
                        <p class="mt-1 max-w-2xl text-sm text-gray-500">Your historical mood records mapped by timestamp.</p>
                    </div>
                    
                    <ul id="moodHistory" class="divide-y divide-gray-200">
                        <!-- JS Injects -->
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <nav class="md:hidden flex justify-around bg-white border-t border-gray-200 pb-safe z-10 shrink-0">
        <a href="dashboard.html" class="flex flex-col items-center p-3 text-gray-500 hover:text-indigo-600">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>

        </a>

            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>

        </a>
        <a href="mood.html" class="flex flex-col items-center p-3 text-gray-500 hover:text-indigo-600">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] font-medium">Mood</span>
        </a>
        <a href="progress.html" class="flex flex-col items-center p-3 text-indigo-600">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[10px] font-medium">Progress</span>
        </a>

    <script>
        checkAuth(true);

        function renderHistory() {
            const state = getAppState();
            const historyList = document.getElementById('moodHistory');
            const history = state.moodHistory || [];
            
            if (history.length === 0) {
                historyList.innerHTML = '<li class="px-6 py-12 text-center text-sm text-gray-500">No data records available yet. Check in via the Mood page first.</li>';
                return;
            }
            
            const recent = [...history].reverse();
            historyList.innerHTML = recent.map(entry => {
                const map = { 
                    great: { text: 'Outstanding', badge: 'bg-green-100 text-green-800' },
                    good: { text: 'Positive', badge: 'bg-blue-100 text-blue-800' },
                    okay: { text: 'Neutral', badge: 'bg-yellow-100 text-yellow-800' },
                    sad: { text: 'Struggling', badge: 'bg-orange-100 text-orange-800' },
                    sick: { text: 'Unwell', badge: 'bg-red-100 text-red-800' }
                };
                const m = map[entry.mood] || { text: 'Unknown', badge: 'bg-gray-100 text-gray-800' };
                
                return `
                    <li class="px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
                        <div class="flex items-center">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${m.badge}">
                                ${m.text}
                            </span>
                        </div>
                        <div class="text-sm text-gray-500">${entry.timestamp}</div>
                    </li>
                `;
            }).join('');
        }

        function clearHistory() {
            if (confirm("Proceed with purging all historical mood data? This cannot be undone.")) {
                const state = getAppState();
                state.moodHistory = [];
                saveAppState(state);
                renderHistory();
            }
        }

        if (window.location.search.includes('logged=true')) {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-[-1rem]');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-1rem]');
            }, 3000);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        renderHistory();
    </script>
