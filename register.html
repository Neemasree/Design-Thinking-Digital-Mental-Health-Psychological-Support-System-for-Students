<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellnessHub | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="app.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4f46e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
        }
        .logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
        .logo-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex; align-items: center; justify-content: center;
        }
        .logo-text { font-size: 1.4rem; font-weight: 800; color: #1e1b4b; }
        .logo-text span { color: #4f46e5; }
        h1 { font-size: 1.6rem; font-weight: 800; color: #111827; margin-bottom: 0.4rem; }
        p.sub { font-size: 0.9rem; color: #6b7280; margin-bottom: 2rem; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%; padding: 0.75rem 1rem;
            border: 1.5px solid #e5e7eb; border-radius: 0.75rem;
            font-size: 0.9rem; color: #111827;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
        .field { margin-bottom: 1.25rem; }
        .btn-primary {
            width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white; font-weight: 700; font-size: 0.95rem;
            border: none; border-radius: 0.75rem; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            margin-top: 0.5rem;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79,70,229,0.4); }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #6b7280; }
        .footer-link a { color: #4f46e5; font-weight: 600; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            </div>
            <div class="logo-text">Wellness<span>Hub</span></div>
        </div>
        <h1>Create your account ✨</h1>
        <p class="sub">Join thousands of students managing their mental wellbeing.</p>

        <form id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
            <div class="field">
                <label for="nameInput">Full Name</label>
                <input type="text" id="nameInput" required placeholder="Your name">
            </div>
            <div class="field">
                <label for="emailInput">Email address</label>
                <input type="email" id="emailInput" autocomplete="email" required placeholder="you@university.edu">
            </div>
            <div class="field">
                <label for="passwordInput">Password</label>
                <input type="password" id="passwordInput" autocomplete="new-password" required placeholder="Min. 6 characters">
            </div>
            <button type="submit" class="btn-primary">Create Account & Start Journey</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script>
        function handleRegister() {
            const email = document.getElementById('emailInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            if (!email || !name || password.length < 6) {
                alert('Please fill all fields. Password must be at least 6 characters.');
                return;
            }
            const state = getAppState() || {};
            state.user = { email, name };
            saveAppState(state);
            window.location.href = 'student-check.html';
        }

        window.onload = () => {
            const state = getAppState();
            if (state && state.user && state.user.email && state.assessment && state.assessment.stress) {
                window.location.href = 'dashboard.html';
            }
        };
    </script>
</body>
</html>
