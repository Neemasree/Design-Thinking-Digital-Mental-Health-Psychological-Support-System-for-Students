<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellnessHub | Initial Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="app.js"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">

    <div class="sm:mx-auto sm:w-full sm:max-w-2xl text-center mb-10">
        <h2 class="text-3xl font-bold tracking-tight text-gray-900">Are you currently a student?</h2>
        <p class="mt-2 text-gray-500">WellnessHub provides highly tailored models for academic tracking.</p>
    </div>

    <div class="mx-auto max-w-3xl w-full px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button onclick="selectStudent(true)" class="bg-white border border-gray-200 hover:border-indigo-500 hover:ring-1 ring-indigo-500 rounded-xl p-8 text-left transition-all shadow-sm">
                <svg class="w-8 h-8 text-indigo-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
                <h3 class="text-xl font-bold text-gray-900 mb-1">Yes, Student</h3>
                <p class="text-sm text-gray-500">I need academic and mental equilibrium support tracking.</p>
            </button>
            <button onclick="selectStudent(false)" class="bg-white border border-gray-200 hover:border-gray-400 rounded-xl p-8 text-left transition-all shadow-sm">
                <svg class="w-8 h-8 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <h3 class="text-xl font-bold text-gray-900 mb-1">No, Professional</h3>
                <p class="text-sm text-gray-500">I am looking for general wellness metric pipelines.</p>
            </button>
        </div>
    </div>

    <script>
        checkAuth(true);
        function selectStudent(isStudent) {
            if (!isStudent) {
                alert('Currently, our SaaS product only processes student wellness profiles. You will be signed out.');
                logout();
                return;
            }
            window.location.href = 'assessment.html';
        }
    </script>
</body>
</html>
