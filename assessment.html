<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellnessHub | Onboarding Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="app.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .assessment-radio:checked + div { border-color: #6366f1; background-color: #f5f3ff; }
        .assessment-radio:checked + div .icon { color: #6366f1; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-10">
            <svg class="mx-auto h-12 w-12 text-indigo-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            <h2 class="text-3xl font-bold tracking-tight text-gray-900">Configure Your Profile</h2>
            <p class="mt-2 text-gray-500">Please provide a baseline measurement across four core categories.</p>
        </div>

        <form id="assessmentForm" onsubmit="event.preventDefault(); submitAssessment();" class="space-y-8 bg-white p-8 md:p-12 shadow-sm border border-gray-200 rounded-2xl">
            
            <!-- Question 1 -->
            <div>
                <h3 class="text-lg font-bold text-gray-900 mb-4">1. Stress Measurement</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="stress" value="not_stressed" required class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Nominal</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="stress" value="moderately_stressed" class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Elevated</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="stress" value="very_stressed" class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Critical</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Question 2 -->
            <div>
                <h3 class="text-lg font-bold text-gray-900 mb-4">2. Academic Milestones</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="exams" value="no_exams" required class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Clear Horizon</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="exams" value="exams_soon" class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Upcoming (2wks)</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="exams" value="exams_very_soon" class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Immediate</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Question 3 -->
            <div>
                <h3 class="text-lg font-bold text-gray-900 mb-4">3. Social Interaction Style</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="personality" value="introvert" required class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Introverted</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="personality" value="ambivert" class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Balanced</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="personality" value="extrovert" class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Extroverted</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Question 4 -->
            <div>
                <h3 class="text-lg font-bold text-gray-900 mb-4">4. Extraneous Blockers</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="challenges" value="no_challenges" required class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">None Recorded</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="challenges" value="minor_challenges" class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Minor Disruptions</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="challenges" value="major_challenges" class="assessment-radio hidden">
                        <div class="border border-gray-200 rounded-lg p-5 text-center transition-colors hover:border-indigo-300">
                            <span class="block text-sm font-semibold text-gray-900 icon transition-colors">Severe Blockers</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Initialize Dashboard Ecosystem
                </button>
            </div>
            
        </form>
    </div>

    <script>
        checkAuth(true);

        function submitAssessment() {
            const form = document.getElementById('assessmentForm');
            const stress = form.querySelector('input[name="stress"]:checked')?.value;
            const exams = form.querySelector('input[name="exams"]:checked')?.value;
            const personality = form.querySelector('input[name="personality"]:checked')?.value;
            const challenges = form.querySelector('input[name="challenges"]:checked')?.value;

            if (!stress || !exams || !personality || !challenges) return;

            const state = getAppState();
            state.assessment = { stress, exams, personality, challenges };
            saveAppState(state);
            
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
